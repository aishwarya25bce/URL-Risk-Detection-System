<!DOCTYPE html>
<html>
<head>
    <title>SafeClick</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</head>

<body>

<div class="navbar">🛡 SafeClick</div>

<div class="container">

    <h1>Is this link <span class="highlight">safe?</span></h1>
    <p>Analyze URLs for phishing indicators and suspicious redirects.</p>

    <!-- INPUT FORM -->
    <form method="POST">
        <input type="text" id="urlInput" name="url" placeholder="Enter URL">
        <button type="submit">Scan</button>
        <button type="button" onclick="startQR()">Scan QR</button>
    </form>

    <!-- QR SCANNER -->
    <div id="reader" style="width:300px; margin:auto;"></div>

    <!-- RESULT -->
    {% if decision %}
    <div class="result {{ level }}">
        <h2>{{ decision }}</h2>
        <p><strong>Score:</strong> {{ score }}</p>

        <ul>
            {% for r in reasons %}
                <li>{{ r }}</li>
            {% endfor %}
        </ul>

        <!-- 🔥 REPORT BUTTON -->
        {% if show_report %}
        <form method="POST" action="/report">
            <input type="hidden" name="url" value="{{ url }}">
            <button class="report-btn">⚠ Report this URL</button>
        </form>
        {% endif %}

    </div>
    {% endif %}

</div>
</body>
</html>
